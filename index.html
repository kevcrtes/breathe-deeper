<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Breathe Deeper</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:#02131d;
    color:white;

    font-family:Arial, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    transition:background 0.4s ease;
}

.app{
    position:relative;
    width:100%;
    height:100%;
}

.logo{
    position:absolute;
    top:28px;
    left:30px;

    font-size:12px;
    letter-spacing:4px;
    opacity:0.25;
    font-weight:bold;
}

.settings-btn{
    position:absolute;
    top:22px;
    right:24px;

    width:42px;
    height:42px;

    border:none;
    background:none;

    color:white;
    font-size:28px;

    opacity:0.2;
    cursor:pointer;

    transition:0.2s ease;
}

.settings-btn:hover{
    opacity:0.6;
}

.center-wrap{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
}

.outer-circle{
    width:420px;
    height:420px;

    border-radius:50%;

    background:rgba(0,0,0,0.35);

    display:flex;
    justify-content:center;
    align-items:center;

    transition:0.2s ease;
}

.inner-circle{
    width:250px;
    height:250px;

    border-radius:50%;

    background:#1f8fba;

    transform:scale(1);

    transition:transform linear;
}

.controls{
    position:absolute;

    bottom:70px;
    left:50%;

    transform:translateX(-50%);

    display:flex;
    align-items:center;
    gap:30px;
}

.control-btn{
    background:none;
    border:none;

    color:white;

    opacity:0.2;

    font-size:28px;

    cursor:pointer;

    transition:0.2s ease;
}

.control-btn:hover{
    opacity:0.6;
}

.panel{
    position:absolute;

    top:80px;
    right:24px;

    width:240px;

    padding:18px;

    border-radius:16px;

    background:rgba(10,10,10,0.75);

    backdrop-filter:blur(20px);

    display:none;

    flex-direction:column;
    gap:18px;
}

.panel.active{
    display:flex;
}

.setting-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.setting-group label{
    font-size:13px;
    opacity:0.7;
}

.setting-group input{
    width:100%;
}

.mode-toggle{
    padding:10px;
    border:none;
    border-radius:10px;

    background:#1f8fba;
    color:white;

    cursor:pointer;
}

body.light{
    background:#ececec;
    color:#111;
}

body.light .settings-btn,
body.light .control-btn,
body.light .logo{
    color:#111;
}

body.light .outer-circle{
    background:rgba(0,0,0,0.1);
}

body.light .panel{
    background:rgba(255,255,255,0.8);
}

</style>
</head>

<body>

<div class="app">

    <div class="logo">
        BREATHE DEEPER
    </div>

    <button class="settings-btn" id="settingsBtn">
        ⚙
    </button>

    <div class="center-wrap">
        <div class="outer-circle">

            <div class="inner-circle" id="circle"></div>

        </div>
    </div>

    <div class="controls">

        <button class="control-btn" id="presetBtn">
            ≡
        </button>

        <button class="control-btn" id="playBtn">
            ▶
        </button>

        <button class="control-btn" id="resetBtn">
            ●
        </button>

    </div>

    <div class="panel" id="panel">

        <div class="setting-group">
            <label>Inhale</label>
            <input type="range" min="1" max="10" value="4" id="inhaleSlider">
        </div>

        <div class="setting-group">
            <label>Exhale</label>
            <input type="range" min="1" max="10" value="6" id="exhaleSlider">
        </div>

        <div class="setting-group">
            <label>Hold After Inhale</label>
            <input type="range" min="0" max="10" value="0" id="hold1Slider">
        </div>

        <div class="setting-group">
            <label>Hold After Exhale</label>
            <input type="range" min="0" max="10" value="0" id="hold2Slider">
        </div>

        <button class="mode-toggle" id="modeToggle">
            Toggle Light / Dark
        </button>

    </div>

</div>

<script>

const circle = document.getElementById("circle");

const playBtn = document.getElementById("playBtn");
const resetBtn = document.getElementById("resetBtn");

const settingsBtn = document.getElementById("settingsBtn");
const panel = document.getElementById("panel");

const inhaleSlider = document.getElementById("inhaleSlider");
const exhaleSlider = document.getElementById("exhaleSlider");

const hold1Slider = document.getElementById("hold1Slider");
const hold2Slider = document.getElementById("hold2Slider");

const modeToggle = document.getElementById("modeToggle");

let inhale = 4;
let exhale = 6;

let hold1 = 0;
let hold2 = 0;

let running = false;

settingsBtn.addEventListener("click", ()=>{

    panel.classList.toggle("active");

});

modeToggle.addEventListener("click", ()=>{

    document.body.classList.toggle("light");

});

inhaleSlider.addEventListener("input", ()=>{

    inhale = inhaleSlider.value;

});

exhaleSlider.addEventListener("input", ()=>{

    exhale = exhaleSlider.value;

});

hold1Slider.addEventListener("input", ()=>{

    hold1 = hold1Slider.value;

});

hold2Slider.addEventListener("input", ()=>{

    hold2 = hold2Slider.value;

});

function wait(ms){

    return new Promise(resolve=>setTimeout(resolve, ms));

}

async function breatheLoop(){

    while(running){

        circle.style.transition = `${inhale}s linear`;
        circle.style.transform = `scale(1.55)`;

        await wait(inhale * 1000);

        await wait(hold1 * 1000);

        circle.style.transition = `${exhale}s linear`;
        circle.style.transform = `scale(1)`;

        await wait(exhale * 1000);

        await wait(hold2 * 1000);

    }

}

playBtn.addEventListener("click", ()=>{

    if(!running){

        running = true;

        playBtn.innerHTML = "■";

        breatheLoop();

    }else{

        running = false;

        playBtn.innerHTML = "▶";

    }

});

resetBtn.addEventListener("click", ()=>{

    circle.style.transition = `0.2s ease`;
    circle.style.transform = `scale(1)`;

});

window.onload = ()=>{

    running = true;

    playBtn.innerHTML = "■";

    breatheLoop();

};

</script>

</body>
</html>
