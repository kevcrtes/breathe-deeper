<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Breathe Deeper</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#02131d;
  --text:#ffffff;
  --muted:rgba(255,255,255,.28);
  --panel:rgba(5,14,20,.72);
  --ring:rgba(0,0,0,.42);
  --circle:#1f8fba;
  --accent:#1f8fba;
  --holdStroke:#7ce2ff;
  --shadow:rgba(0,0,0,.22);
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:none;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  transition:background .5s ease, color .5s ease;
}

.app{
  width:100vw;
  height:100dvh;
  position:relative;
  overflow:hidden;
}

.logo{
  position:absolute;
  top:28px;
  left:30px;
  font-size:11px;
  letter-spacing:4px;
  font-weight:700;
  color:var(--muted);
  user-select:none;
  z-index:4;
}

.icon-btn{
  border:none;
  background:none;
  color:var(--muted);
  cursor:pointer;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:color .2s ease, transform .2s ease;
}

.icon-btn svg{
  width:26px;
  height:26px;
  display:block;
  stroke:currentColor;
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.icon-btn:hover{
  color:var(--text);
  transform:scale(1.04);
}

.settings-btn{
  position:absolute;
  top:25px;
  right:28px;
  z-index:5;
}

.settings-btn svg{
  width:30px;
  height:30px;
}

.stage{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.outer-circle{
  position:relative;
  width:min(52vw, 520px);
  height:min(52vw, 520px);
  min-width:280px;
  min-height:280px;
  border-radius:50%;
  background:var(--ring);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  opacity:0;
  animation:fadeIn 1.2s ease forwards;
  box-shadow:
    inset 0 0 34px var(--shadow),
    0 18px 70px rgba(0,0,0,.10);
}

.inner-circle{
  width:100%;
  height:100%;
  border-radius:50%;
  background:var(--circle);
  transform:scale(0);
  transition:transform linear, background .4s ease;
  box-shadow:inset 0 0 24px rgba(0,0,0,.08);
  z-index:1;
}

.hold-ring{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:3;
  pointer-events:none;
  opacity:0;
  transition:opacity .55s ease;
  transform:rotate(-90deg);
  filter:drop-shadow(0 0 7px var(--holdStroke));
}

.hold-ring.active{
  opacity:1;
}

.hold-progress{
  fill:none;
  stroke:var(--holdStroke);
  stroke-width:1.25;
  stroke-linecap:round;
  stroke-dasharray:314;
  stroke-dashoffset:314;
  transition:stroke .4s ease;
}

.controls{
  position:absolute;
  bottom:68px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  z-index:4;
}

.controls .icon-btn{
  width:34px;
  height:34px;
}

.panel{
  position:absolute;
  z-index:10;
  display:none;
  border:1px solid rgba(255,255,255,.08);
  background:var(--panel);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 20px 80px rgba(0,0,0,.28);
  border-radius:22px;
  color:var(--text);
  touch-action:auto;
}

.panel.active{display:block;}

.settings-panel{
  top:76px;
  right:28px;
  width:290px;
  padding:18px;
}

.presets-panel{
  bottom:118px;
  left:50%;
  transform:translateX(-50%);
  width:280px;
  padding:12px;
}

.panel-title{
  font-size:10px;
  letter-spacing:3px;
  color:var(--muted);
  margin-bottom:16px;
  font-weight:700;
  cursor:grab;
  user-select:none;
}

.setting{margin-bottom:15px;}

.setting-top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:8px;
}

.setting-top span:last-child{color:var(--muted);}

input[type="range"]{
  width:100%;
  accent-color:var(--accent);
}

.preset-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.preset{
  border:none;
  border-radius:14px;
  padding:13px 10px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  text-align:left;
  transition:.2s ease;
}

.preset:hover{
  background:rgba(255,255,255,.12);
  transform:translateY(-1px);
}

.preset strong{
  display:block;
  font-size:15px;
  margin-bottom:4px;
}

.preset span{
  font-size:10px;
  letter-spacing:1px;
  color:var(--muted);
}

.apply-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:13px 10px;
  margin:6px 0 10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-size:13px;
  letter-spacing:1px;
}

.toggle-row{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.small-btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:12px 10px;
  background:rgba(255,255,255,.07);
  color:var(--text);
  cursor:pointer;
}

.color-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:14px;
  font-size:13px;
}

input[type="color"]{
  border:none;
  width:38px;
  height:28px;
  background:none;
  cursor:pointer;
}

@keyframes fadeIn{
  to{opacity:1;}
}

@media(max-width:700px){
  .outer-circle{
    width:78vw;
    height:78vw;
  }

  .settings-panel{
    top:74px;
    right:16px;
    width:calc(100vw - 32px);
  }

  .presets-panel{
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:calc(100vw - 44px);
    max-width:310px;
  }

  .logo{
    left:20px;
    top:24px;
  }

  .settings-btn{
    right:20px;
    top:20px;
  }

  .controls{
    bottom:54px;
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="logo">BREATHE DEEPER</div>

  <button class="icon-btn settings-btn" id="settingsBtn" aria-label="Settings">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.8 1.8 0 0 0 .36 2l.04.04a2 2 0 0 1-2.83 2.83l-.04-.04a1.8 1.8 0 0 0-2-.36 1.8 1.8 0 0 0-1.1 1.65V21a2 2 0 0 1-4 0v-.08a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-2 .36l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04a1.8 1.8 0 0 0 .36-2 1.8 1.8 0 0 0-1.65-1.1H3a2 2 0 0 1 0-4h.08a1.8 1.8 0 0 0 1.65-1.1 1.8 1.8 0 0 0-.36-2l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04a1.8 1.8 0 0 0 2 .36 1.8 1.8 0 0 0 1.1-1.65V3a2 2 0 0 1 4 0v.08a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 2-.36l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04a1.8 1.8 0 0 0-.36 2 1.8 1.8 0 0 0 1.65 1.1H21a2 2 0 0 1 0 4h-.08A1.8 1.8 0 0 0 19.4 15z"></path>
    </svg>
  </button>

  <div class="stage">
    <div class="outer-circle" id="outerCircle">
      <div class="inner-circle" id="circle"></div>

      <svg class="hold-ring" id="holdRing" viewBox="0 0 100 100" preserveAspectRatio="none">
        <circle class="hold-progress" id="holdProgress" cx="50" cy="50" r="49.4"></circle>
      </svg>
    </div>
  </div>

  <div class="controls">
    <button class="icon-btn" id="presetBtn" aria-label="Presets">
      <svg viewBox="0 0 24 24">
        <path d="M6 7h12"></path>
        <path d="M6 12h12"></path>
        <path d="M6 17h12"></path>
      </svg>
    </button>

    <button class="icon-btn" id="resetBtn" aria-label="Reset">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="6"></circle>
      </svg>
    </button>
  </div>

  <div class="panel presets-panel" id="presetsPanel">
    <div class="panel-title">PRESETS</div>

    <div class="preset-grid">
      <button class="preset" data-in="4" data-h1="0" data-out="6" data-h2="0"><strong>4 · 6</strong><span>CALM</span></button>
      <button class="preset" data-in="5" data-h1="0" data-out="5" data-h2="0"><strong>5 · 5</strong><span>BALANCE</span></button>
      <button class="preset" data-in="4" data-h1="0" data-out="4" data-h2="0"><strong>4 · 4</strong><span>EASY</span></button>
      <button class="preset" data-in="4" data-h1="7" data-out="8" data-h2="0"><strong>4 · 7 · 8</strong><span>DEEP</span></button>
      <button class="preset" data-in="4" data-h1="4" data-out="4" data-h2="4"><strong>BOX</strong><span>4 · 4 · 4 · 4</span></button>
      <button class="preset" data-in="3" data-h1="0" data-out="7" data-h2="0"><strong>3 · 7</strong><span>SLOW</span></button>
    </div>
  </div>

  <div class="panel settings-panel" id="settingsPanel">
    <div class="panel-title">SETTINGS</div>

    <div class="setting">
      <div class="setting-top"><span>Inhale</span><span id="inhaleValue">4 sec</span></div>
      <input type="range" min="1" max="12" value="4" id="inhaleSlider">
    </div>

    <div class="setting">
      <div class="setting-top"><span>Hold</span><span id="hold1Value">0 sec</span></div>
      <input type="range" min="0" max="12" value="0" id="hold1Slider">
    </div>

    <div class="setting">
      <div class="setting-top"><span>Exhale</span><span id="exhaleValue">6 sec</span></div>
      <input type="range" min="1" max="12" value="6" id="exhaleSlider">
    </div>

    <div class="setting">
      <div class="setting-top"><span>Rest</span><span id="hold2Value">0 sec</span></div>
      <input type="range" min="0" max="12" value="0" id="hold2Slider">
    </div>

    <button class="apply-btn" id="applyBtn">Apply</button>

    <div class="toggle-row">
      <button class="small-btn" id="darkBtn">Dark</button>
      <button class="small-btn" id="lightBtn">Light</button>
    </div>

    <div class="color-row">
      <span>Circle</span>
      <input type="color" id="colorPicker" value="#1f8fba">
    </div>

    <div class="color-row">
      <span>Container</span>
      <input type="color" id="ringPicker" value="#000000">
    </div>

    <div class="color-row">
      <span>Background</span>
      <input type="color" id="bgPicker" value="#02131d">
    </div>
  </div>

</div>

<script>
const circle = document.getElementById("circle");
const outerCircle = document.getElementById("outerCircle");
const holdRing = document.getElementById("holdRing");
const holdProgress = document.getElementById("holdProgress");

const resetBtn = document.getElementById("resetBtn");
const presetBtn = document.getElementById("presetBtn");
const settingsBtn = document.getElementById("settingsBtn");
const applyBtn = document.getElementById("applyBtn");

const presetsPanel = document.getElementById("presetsPanel");
const settingsPanel = document.getElementById("settingsPanel");

const inhaleSlider = document.getElementById("inhaleSlider");
const hold1Slider = document.getElementById("hold1Slider");
const exhaleSlider = document.getElementById("exhaleSlider");
const hold2Slider = document.getElementById("hold2Slider");

const inhaleValue = document.getElementById("inhaleValue");
const hold1Value = document.getElementById("hold1Value");
const exhaleValue = document.getElementById("exhaleValue");
const hold2Value = document.getElementById("hold2Value");

const darkBtn = document.getElementById("darkBtn");
const lightBtn = document.getElementById("lightBtn");
const colorPicker = document.getElementById("colorPicker");
const ringPicker = document.getElementById("ringPicker");
const bgPicker = document.getElementById("bgPicker");

let activeSettings = { inhale:4, hold1:0, exhale:6, hold2:0 };
let draftSettings = { ...activeSettings };

let running = true;
let loopId = 0;
let timers = [];

const holdLength = 314;

const themes = {
  dark:{
    bg:"#02131d",
    circle:"#1f8fba",
    ring:"#000000"
  },
  light:{
    bg:"#eeeeee",
    circle:"#1f8fba",
    ring:"#c9c9c9"
  }
};

function hexToRgb(hex){
  const clean = hex.replace("#","");
  const bigint = parseInt(clean,16);
  return {
    r:(bigint >> 16) & 255,
    g:(bigint >> 8) & 255,
    b:bigint & 255
  };
}

function rgbToHex(r,g,b){
  return "#" + [r,g,b].map(x => {
    const hex = Math.max(0, Math.min(255, Math.round(x))).toString(16);
    return hex.length === 1 ? "0" + hex : hex;
  }).join("");
}

function lightenHex(hex, amount = 62){
  const {r,g,b} = hexToRgb(hex);
  return rgbToHex(
    r + (255 - r) * amount / 100,
    g + (255 - g) * amount / 100,
    b + (255 - b) * amount / 100
  );
}

function luminance(hex){
  const {r,g,b} = hexToRgb(hex);
  const channels = [r,g,b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return channels[0] * 0.2126 + channels[1] * 0.7152 + channels[2] * 0.0722;
}

function updateAutoContrast(bg){
  const isLight = luminance(bg) > 0.48;

  if(isLight){
    document.documentElement.style.setProperty("--text", "#101820");
    document.documentElement.style.setProperty("--muted", "rgba(0,0,0,.28)");
    document.documentElement.style.setProperty("--panel", "rgba(255,255,255,.76)");
  }else{
    document.documentElement.style.setProperty("--text", "#ffffff");
    document.documentElement.style.setProperty("--muted", "rgba(255,255,255,.28)");
    document.documentElement.style.setProperty("--panel", "rgba(5,14,20,.72)");
  }
}

function setBackgroundColor(hex){
  document.documentElement.style.setProperty("--bg", hex);
  updateAutoContrast(hex);
}

function setCircleColor(hex){
  const lum = luminance(hex);
  let holdColor;

  if(lum > 0.82){
    const {r,g,b} = hexToRgb(hex);
    holdColor = rgbToHex(r * 0.42, g * 0.42, b * 0.42);
  }else{
    holdColor = lightenHex(hex, 62);
  }

  document.documentElement.style.setProperty("--circle", hex);
  document.documentElement.style.setProperty("--accent", hex);
  document.documentElement.style.setProperty("--holdStroke", holdColor);
}

function setRingColor(hex){
  const {r,g,b} = hexToRgb(hex);
  const alpha = luminance(hex) > 0.48 ? ".72" : ".42";
  document.documentElement.style.setProperty("--ring", `rgba(${r},${g},${b},${alpha})`);

  const shadowStrength = luminance(hex) > 0.48 ? ".20" : ".32";
  document.documentElement.style.setProperty("--shadow", `rgba(0,0,0,${shadowStrength})`);
}

function applyTheme(theme){
  bgPicker.value = theme.bg;
  colorPicker.value = theme.circle;
  ringPicker.value = theme.ring;

  setBackgroundColor(theme.bg);
  setCircleColor(theme.circle);
  setRingColor(theme.ring);
}

function clearTimers(){
  timers.forEach(timer => clearTimeout(timer));
  timers = [];
}

function wait(ms){
  return new Promise(resolve => {
    const timer = setTimeout(resolve, ms);
    timers.push(timer);
  });
}

function updateLabels(){
  inhaleValue.textContent = draftSettings.inhale + " sec";
  hold1Value.textContent = draftSettings.hold1 + " sec";
  exhaleValue.textContent = draftSettings.exhale + " sec";
  hold2Value.textContent = draftSettings.hold2 + " sec";
}

function syncSliders(){
  inhaleSlider.value = draftSettings.inhale;
  hold1Slider.value = draftSettings.hold1;
  exhaleSlider.value = draftSettings.exhale;
  hold2Slider.value = draftSettings.hold2;
  updateLabels();
}

function resetHoldRing(){
  holdRing.classList.remove("active");
  holdRing.style.opacity = "";
  holdRing.style.transition = "";
  holdProgress.style.transition = "none";
  holdProgress.style.strokeDashoffset = holdLength;
}

async function animateHold(duration, id){
  resetHoldRing();

  await wait(60);
  if(!running || id !== loopId) return;

  const fadeTime = Math.min(0.65, duration * 0.28);
  const fadeStart = Math.max(0, duration - fadeTime);

  holdRing.classList.add("active");
  holdRing.style.transition = "opacity .18s ease";
  holdRing.style.opacity = "1";

  holdProgress.style.transition = `stroke-dashoffset ${duration}s linear`;
  holdProgress.style.strokeDashoffset = "0";

  setTimeout(() => {
    if(!running || id !== loopId) return;
    holdRing.style.transition = `opacity ${fadeTime}s ease`;
    holdRing.style.opacity = "0";
  }, fadeStart * 1000);

  await wait(duration * 1000);
  if(!running || id !== loopId) return;

  holdRing.classList.remove("active");
  holdRing.style.opacity = "";
  holdRing.style.transition = "";

  holdProgress.style.transition = "none";
  holdProgress.style.strokeDashoffset = holdLength;
}

function restartBreath(){
  running = false;
  loopId++;
  clearTimers();
  resetHoldRing();

  circle.style.transition = "none";
  circle.style.transform = "scale(0)";

  setTimeout(() => {
    running = true;
    loopId++;
    breatheLoop(loopId);
  }, 120);
}

async function breatheLoop(id){
  while(running && id === loopId){

    resetHoldRing();

    circle.style.transition = `${activeSettings.inhale}s cubic-bezier(.25,.02,.75,.98)`;
    circle.style.transform = "scale(1)";

    await wait(activeSettings.inhale * 1000);
    if(!running || id !== loopId) return;

    if(activeSettings.hold1 > 0){
      circle.style.transition = "none";
      circle.style.transform = "scale(1)";
      await animateHold(activeSettings.hold1, id);
      if(!running || id !== loopId) return;
    }

    circle.style.transition = `${activeSettings.exhale}s cubic-bezier(.25,.02,.75,.98)`;
    circle.style.transform = "scale(0)";

    await wait(activeSettings.exhale * 1000);
    if(!running || id !== loopId) return;

    if(activeSettings.hold2 > 0){
      circle.style.transition = "none";
      circle.style.transform = "scale(0)";
      await animateHold(activeSettings.hold2, id);
      if(!running || id !== loopId) return;
    }
  }
}

resetBtn.addEventListener("click", () => {
  restartBreath();
});

applyBtn.addEventListener("click", () => {
  activeSettings = { ...draftSettings };
  restartBreath();
  settingsPanel.classList.remove("active");
});

settingsBtn.addEventListener("click", () => {
  settingsPanel.classList.toggle("active");
  presetsPanel.classList.remove("active");
});

presetBtn.addEventListener("click", () => {
  presetsPanel.classList.toggle("active");
  settingsPanel.classList.remove("active");
});

document.querySelectorAll(".preset").forEach(btn => {
  btn.addEventListener("click", () => {
    activeSettings = {
      inhale:Number(btn.dataset.in),
      hold1:Number(btn.dataset.h1),
      exhale:Number(btn.dataset.out),
      hold2:Number(btn.dataset.h2)
    };

    draftSettings = { ...activeSettings };
    syncSliders();
    presetsPanel.classList.remove("active");
    restartBreath();
  });
});

[inhaleSlider, hold1Slider, exhaleSlider, hold2Slider].forEach(slider => {
  slider.addEventListener("input", () => {
    draftSettings.inhale = Number(inhaleSlider.value);
    draftSettings.hold1 = Number(hold1Slider.value);
    draftSettings.exhale = Number(exhaleSlider.value);
    draftSettings.hold2 = Number(hold2Slider.value);
    updateLabels();
  });
});

darkBtn.addEventListener("click", () => {
  applyTheme(themes.dark);
});

lightBtn.addEventListener("click", () => {
  applyTheme(themes.light);
});

colorPicker.addEventListener("input", () => {
  setCircleColor(colorPicker.value);
});

ringPicker.addEventListener("input", () => {
  setRingColor(ringPicker.value);
});

bgPicker.addEventListener("input", () => {
  setBackgroundColor(bgPicker.value);
});

document.addEventListener("click", e => {
  if(!settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)){
    settingsPanel.classList.remove("active");
  }

  if(!presetsPanel.contains(e.target) && !presetBtn.contains(e.target)){
    presetsPanel.classList.remove("active");
  }
});

function makeDraggable(panel){
  const handle = panel.querySelector(".panel-title");
  let dragging = false;
  let offsetX = 0;
  let offsetY = 0;

  handle.addEventListener("pointerdown", e => {
    dragging = true;
    const rect = panel.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    panel.style.left = rect.left + "px";
    panel.style.top = rect.top + "px";
    panel.style.right = "auto";
    panel.style.bottom = "auto";
    panel.style.transform = "none";

    handle.setPointerCapture(e.pointerId);
  });

  handle.addEventListener("pointermove", e => {
    if(!dragging) return;

    const x = Math.min(window.innerWidth - panel.offsetWidth - 10, Math.max(10, e.clientX - offsetX));
    const y = Math.min(window.innerHeight - panel.offsetHeight - 10, Math.max(10, e.clientY - offsetY));

    panel.style.left = x + "px";
    panel.style.top = y + "px";
  });

  handle.addEventListener("pointerup", () => {
    dragging = false;
  });
}

makeDraggable(settingsPanel);
makeDraggable(presetsPanel);

holdProgress.style.strokeDasharray = holdLength;
holdProgress.style.strokeDashoffset = holdLength;

syncSliders();
applyTheme(themes.dark);

window.onload = () => {
  restartBreath();
};
</script>

</body>
</html>
