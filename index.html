<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Breathe Deeper</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#02131d;
  --text:#ffffff;
  --muted:rgba(255,255,255,.28);
  --panel:rgba(5,14,20,.72);
  --ring:rgba(0,0,0,.42);
  --circle:#1f8fba;
  --accent:#1f8fba;
  --holdStroke:#7ce2ff;
  --shadow:rgba(0,0,0,.22);
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:none;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
  transition:background .5s ease, color .5s ease;
}

.app{
  width:100vw;
  height:100dvh;
  position:relative;
  overflow:hidden;
}

.logo{
  position:absolute;
  top:28px;
  left:30px;
  font-size:11px;
  letter-spacing:4px;
  font-weight:700;
  color:var(--muted);
  user-select:none;
  z-index:4;
}

.icon-btn{
  border:none;
  background:none;
  color:var(--muted);
  cursor:pointer;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:color .2s ease, transform .2s ease;
}

.icon-btn svg{
  width:26px;
  height:26px;
  display:block;
  stroke:currentColor;
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.icon-btn:hover{
  color:var(--text);
  transform:scale(1.04);
}

.settings-btn{
  position:absolute;
  top:25px;
  right:28px;
  z-index:5;
}

.settings-btn svg{
  width:30px;
  height:30px;
}

.stage{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.outer-circle{
  position:relative;
  width:min(52vw, 520px);
  height:min(52vw, 520px);
  min-width:280px;
  min-height:280px;
  border-radius:50%;
  background:var(--ring);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  opacity:0;
  animation:fadeIn 1.2s ease forwards;
  box-shadow:
    inset 0 0 34px var(--shadow),
    0 18px 70px rgba(0,0,0,.10);
}

.inner-circle{
  width:100%;
  height:100%;
  border-radius:50%;
  background:var(--circle);
  transform:scale(0);
  transition:transform linear, background .4s ease;
  box-shadow:inset 0 0 24px rgba(0,0,0,.08);
  z-index:1;
}

.hold-ring{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:3;
  pointer-events:none;
  opacity:0;
  transition:opacity .35s ease;
  transform:rotate(-90deg);
  filter:drop-shadow(0 0 7px var(--holdStroke));
}

.hold-ring.active{
  opacity:1;
}

.hold-progress{
  fill:none;
  stroke:var(--holdStroke);
  stroke-width:1.25;
  stroke-linecap:round;
  stroke-dasharray:314;
  stroke-dashoffset:314;
}

.controls{
  position:absolute;
  bottom:68px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  z-index:4;
}

.controls .icon-btn{
  width:34px;
  height:34px;
}

.panel{
  position:absolute;
  z-index:10;
  display:none;
  border:1px solid rgba(255,255,255,.08);
  background:var(--panel);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  box-shadow:0 20px 80px rgba(0,0,0,.28);
  border-radius:22px;
  color:var(--text);
  touch-action:auto;
}

.panel.active{display:block;}

.settings-panel{
  top:76px;
  right:28px;
  width:290px;
  padding:18px;
}

.presets-panel{
  bottom:118px;
  left:50%;
  transform:translateX(-50%);
  width:280px;
  padding:12px;
}

.panel-title{
  font-size:10px;
  letter-spacing:3px;
  color:var(--muted);
  margin-bottom:16px;
  font-weight:700;
  cursor:grab;
  user-select:none;
}

.setting{margin-bottom:15px;}

.setting-top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:8px;
}

.setting-top span:last-child{color:var(--muted);}

input[type="range"]{
  width:100%;
  accent-color:var(--accent);
}

.preset-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.preset{
  border:none;
  border-radius:14px;
  padding:13px 10px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  text-align:left;
  transition:.2s ease;
}

.preset:hover{
  background:rgba(255,255,255,.12);
  transform:translateY(-1px);
}

.preset strong{
  display:block;
  font-size:15px;
  margin-bottom:4px;
}

.preset span{
  font-size:10px;
  letter-spacing:1px;
  color:var(--muted);
}

.apply-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:13px 10px;
  margin:6px 0 10px;
  background:var(--accent);
  color:white;
  cursor:pointer;
  font-size:13px;
  letter-spacing:1px;
}

.toggle-row{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.small-btn{
  flex:1;
  border:none;
  border-radius:14px;
  padding:12px 10px;
  background:rgba(255,255,255,.07);
  color:var(--text);
  cursor:pointer;
}

.color-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:14px;
  font-size:13px;
}

input[type="color"]{
  border:none;
  width:38px;
  height:28px;
  background:none;
  cursor:pointer;
}

@keyframes fadeIn{
  to{opacity:1;}
}

@media(max-width:700px){
  .outer-circle{
    width:78vw;
    height:78vw;
  }

  .settings-panel{
    top:74px;
    right:16px;
    width:calc(100vw - 32px);
  }

  .presets-panel{
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:calc(100vw - 44px);
    max-width:310px;
  }

  .logo{
    left:20px;
    top:24px;
  }

  .settings-btn{
    right:20px;
    top:20px;
  }

  .controls{
    bottom:54px;
  }
}
</style>
</head>

<body>
<div class="app">

<div class="logo">BREATHE DEEPER</div>

<button class="icon-btn settings-btn" id="settingsBtn">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"></circle>
<path d="M19.4 15a1.8 1.8 0 0 0 .36 2l.04.04a2 2 0 0 1-2.83 2.83l-.04-.04a1.8 1.8 0 0 0-2-.36 1.8 1.8 0 0 0-1.1 1.65V21a2 2 0 0 1-4 0v-.08a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-2 .36l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04a1.8 1.8 0 0 0 .36-2 1.8 1.8 0 0 0-1.65-1.1H3a2 2 0 0 1 0-4h.08a1.8 1.8 0 0 0 1.65-1.1 1.8 1.8 0 0 0-.36-2l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04a1.8 1.8 0 0 0 2 .36 1.8 1.8 0 0 0 1.1-1.65V3a2 2 0 0 1 4 0v.08a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 2-.36l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04a1.8 1.8 0 0 0-.36 2 1.8 1.8 0 0 0 1.65 1.1H21a2 2 0 0 1 0 4h-.08A1.8 1.8 0 0 0 19.4 15z"></path>
</svg>
</button>

<div class="stage">
<div class="outer-circle">

<div class="inner-circle" id="circle"></div>

<svg class="hold-ring" id="holdRing" viewBox="0 0 100 100">
<circle class="hold-progress" id="holdProgress" cx="50" cy="50" r="49.4"></circle>
</svg>

</div>
</div>

<div class="controls">

<button class="icon-btn" id="presetBtn">
<svg viewBox="0 0 24 24">
<path d="M6 7h12"></path>
<path d="M6 12h12"></path>
<path d="M6 17h12"></path>
</svg>
</button>

<button class="icon-btn" id="resetBtn">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="6"></circle>
</svg>
</button>

</div>

<script>
const circle = document.getElementById("circle");
const holdRing = document.getElementById("holdRing");
const holdProgress = document.getElementById("holdProgress");

let inhale = 4;
let hold1 = 0;
let exhale = 6;
let hold2 = 0;

let loopId = 0;

const circumference = 314;

function hexToRgb(hex){
hex = hex.replace("#","");
const bigint = parseInt(hex,16);
return {
r:(bigint >> 16) & 255,
g:(bigint >> 8) & 255,
b:bigint & 255
};
}

function rgbToHex(r,g,b){
return "#" + [r,g,b].map(x => {
const h = Math.round(x).toString(16);
return h.length === 1 ? "0"+h : h;
}).join("");
}

function luminance(hex){
const {r,g,b} = hexToRgb(hex);
return (0.2126*r + 0.7152*g + 0.0722*b)/255;
}

function getAdaptiveHoldColor(hex){

const lum = luminance(hex);

if(lum > .82){

const {r,g,b} = hexToRgb(hex);

return rgbToHex(
r * .45,
g * .45,
b * .45
);

}else{

const {r,g,b} = hexToRgb(hex);

return rgbToHex(
r + (255-r)*.65,
g + (255-g)*.65,
b + (255-b)*.65
);

}
}

function setCircleColor(hex){

document.documentElement.style.setProperty("--circle", hex);

const holdColor = getAdaptiveHoldColor(hex);

document.documentElement.style.setProperty("--holdStroke", holdColor);

}

function resetHoldRing(){

holdRing.classList.remove("active");

holdProgress.style.transition = "none";
holdProgress.style.strokeDasharray = circumference;
holdProgress.style.strokeDashoffset = circumference;

}

async function wait(ms){
return new Promise(resolve => setTimeout(resolve,ms));
}

async function animateHold(duration, id){

holdRing.classList.add("active");

holdProgress.style.transition = "none";
holdProgress.style.strokeDashoffset = circumference;

await wait(40);

if(id !== loopId) return;

const fadeStart = duration * .82;

holdProgress.style.transition = `stroke-dashoffset ${duration}s linear, opacity ${duration-fadeStart}s ease`;

holdProgress.style.strokeDashoffset = "0";

setTimeout(() => {

if(id !== loopId) return;

holdRing.style.opacity = "0";

}, fadeStart * 1000);

await wait(duration * 1000);

holdRing.classList.remove("active");

holdRing.style.opacity = "";

holdProgress.style.transition = "none";
holdProgress.style.strokeDashoffset = circumference;

}

async function breathe(id){

while(id === loopId){

resetHoldRing();

circle.style.transition = `${inhale}s cubic-bezier(.25,.02,.75,.98)`;
circle.style.transform = "scale(1)";

await wait(inhale * 1000);

if(id !== loopId) return;

if(hold1 > 0){

circle.style.transition = "none";
circle.style.transform = "scale(1)";

await animateHold(hold1,id);

}

if(id !== loopId) return;

circle.style.transition = `${exhale}s cubic-bezier(.25,.02,.75,.98)`;
circle.style.transform = "scale(0)";

await wait(exhale * 1000);

if(id !== loopId) return;

if(hold2 > 0){

circle.style.transition = "none";
circle.style.transform = "scale(0)";

await animateHold(hold2,id);

}

}
}

function restart(){

loopId++;

circle.style.transition = "none";
circle.style.transform = "scale(0)";

setTimeout(() => {
breathe(loopId);
},120);

}

holdProgress.style.strokeDasharray = circumference;
holdProgress.style.strokeDashoffset = circumference;

setCircleColor("#1f8fba");

restart();
</script>

</body>
</html>
